<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Jardín mágico</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
animation:sunrise 12s forwards;
}

/* cielo amanecer */

@keyframes sunrise{
0%{background:#0b1a3a;}
50%{background:#ffb6c1;}
100%{background:#87ceeb;}
}

/* suelo */

.ground{
position:absolute;
bottom:0;
width:100%;
height:30%;
background:#4b2e17;
}

/* plantas */

.plant{
position:absolute;
bottom:30%;
width:6px;
height:0;
background:green;
animation:grow 5s forwards;
}

@keyframes grow{
to{
height:120px;
}
}

/* flores */

.flower{
position:absolute;
top:-20px;
left:-10px;
opacity:0;
animation:bloom 2s forwards;
animation-delay:5s;
}

.petal{
position:absolute;
width:12px;
height:12px;
border-radius:50%;
}

.center{
position:absolute;
width:10px;
height:10px;
background:yellow;
border-radius:50%;
top:8px;
left:8px;
}

.p1{top:0;left:8px;}
.p2{top:8px;left:0;}
.p3{top:8px;left:16px;}
.p4{top:16px;left:8px;}
.p5{top:4px;left:4px;}
.p6{top:4px;left:12px;}

@keyframes bloom{
to{
opacity:1;
transform:scale(1.3);
}
}

/* mariposas */

.butterfly{
position:absolute;
font-size:24px;
animation:fly 15s linear infinite;
}

@keyframes fly{
0%{transform:translateX(-100px);}
100%{transform:translateX(110vw);}
}

/* abejas */

.bee{
position:absolute;
font-size:18px;
animation:beeFly 10s linear infinite;
}

@keyframes beeFly{
0%{transform:translateX(-100px);}
100%{transform:translateX(110vw);}
}

/* pétalos cayendo */

.petalFall{
position:absolute;
font-size:16px;
animation:fall 12s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);}
}

/* arcoiris */

.rainbow{
position:absolute;
bottom:30%;
left:50%;
transform:translateX(-50%);
width:600px;
height:300px;
border-radius:300px 300px 0 0;
background:linear-gradient(
red,
orange,
yellow,
green,
blue,
indigo,
violet
);
opacity:0;
animation:showRainbow 4s forwards;
animation-delay:8s;
}

@keyframes showRainbow{
to{
opacity:0.8;
}
}

</style>
</head>

<body>

<div class="ground"></div>
<div class="rainbow"></div>

<!-- MUCHAS FLORES -->

<script>

for(let i=0;i<25;i++){

let plant=document.createElement("div");
plant.className="plant";
plant.style.left=Math.random()*100+"%";

let flower=document.createElement("div");
flower.className="flower";

let colors=["pink","yellow","red","purple","orange","cyan"];

for(let p=1;p<=6;p++){

let petal=document.createElement("div");
petal.className="petal p"+p;
petal.style.background=colors[Math.floor(Math.random()*colors.length)];
flower.appendChild(petal);

}

let center=document.createElement("div");
center.className="center";

flower.appendChild(center);
plant.appendChild(flower);

document.body.appendChild(plant);

}

/* mariposas */

for(let i=0;i<6;i++){

let b=document.createElement("div");
b.className="butterfly";
b.innerHTML="🦋";
b.style.top=Math.random()*70+"%";
b.style.animationDelay=Math.random()*10+"s";

document.body.appendChild(b);

}

/* abejas */

for(let i=0;i<4;i++){

let bee=document.createElement("div");
bee.className="bee";
bee.innerHTML="🐝";
bee.style.top=Math.random()*70+"%";
bee.style.animationDelay=Math.random()*6+"s";

document.body.appendChild(bee);

}

/* pétalos cayendo */

for(let i=0;i<12;i++){

let petal=document.createElement("div");
petal.className="petalFall";
petal.innerHTML="🌸";
petal.style.left=Math.random()*100+"%";
petal.style.animationDelay=Math.random()*10+"s";

document.body.appendChild(petal);

}

</script>

</body>
</html>
