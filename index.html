<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Jardín mágico</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:linear-gradient(#87ceeb, #a0d8f1); /* cielo día */
  transition:background 2s;
}

/* suelo */
.ground{
  position:absolute;
  bottom:0;
  width:100%;
  height:30%;
  background:#3b2a1a;
}

/* sol / luna */
#sun{
  position:absolute;
  top:40px;
  right:80px;
  width:120px;
  height:120px;
  border-radius:50%;
  background:gold;
  box-shadow:0 0 70px gold;
  cursor:pointer;
  transition:all 2s;
}

/* arcoiris */
.rainbow{
  position:absolute;
  bottom:30%;
  left:50%;
  transform:translateX(-50%);
  width:700px;
  height:350px;
  border-radius:350px 350px 0 0;
  background:linear-gradient(red,orange,yellow,green,blue,indigo,violet);
  opacity:0.7;
  transition:opacity 2s;
}

/* tallos */
.plant{
  position:absolute;
  bottom:30%;
  width:8px;
  background:green;
}

/* flores */
.flower{
  position:absolute;
  top:-35px;
  left:-22px;
  transition:transform 1.5s;
}

/* pétalos */
.petal{
  position:absolute;
  border-radius:50%;
  background:#c77dff; /* lila */
}

.center{
  position:absolute;
  width:16px;
  height:16px;
  background:yellow;
  border-radius:50%;
  top:18px;
  left:18px;
}

/* flores cerradas */
.closed{
  transform:scale(0.4) rotate(90deg);
}

/* mariposas */
.butterfly{
  position:absolute;
  font-size:24px;
  animation:fly 18s linear infinite;
}

@keyframes fly{
  0%{transform:translateX(-100px);}
  100%{transform:translateX(110vw);}
}

/* abejas */
.bee{
  position:absolute;
  font-size:18px;
  animation:beeFly 12s linear infinite;
}

@keyframes beeFly{
  0%{transform:translateX(-100px);}
  100%{transform:translateX(110vw);}
}

/* pétalos cayendo */
.petalFall{
  position:absolute;
  font-size:18px;
  animation:fall 12s linear infinite;
}

@keyframes fall{
  0%{transform:translateY(-50px);}
  100%{transform:translateY(110vh);}
}

/* estrellas */
.star{
  position:absolute;
  color:white;
  font-size:14px;
  opacity:0;
  transition:opacity 2s;
}

/* luciérnagas */
.firefly{
  position:absolute;
  width:6px;
  height:6px;
  background:yellow;
  border-radius:50%;
  box-shadow:0 0 10px yellow;
  opacity:0;
  animation:blink 2s infinite alternate;
}

@keyframes blink{
  from{opacity:0.2}
  to{opacity:1}
}
</style>
</head>

<body>

<!-- MÚSICA de YouTube -->
<iframe width="0" height="0" src="https://youtu.be/purdUs68Tmc?si=IuYKtBnyIca9RPGw" allow="autoplay" style="display:none"></iframe>

<div class="ground"></div>
<div class="rainbow"></div>
<div id="sun"></div>

<script>
let flowers=[];

// FLORES EQUILIBRADAS CON PÉTALOS NATURALES
let columns = 15; 
for(let i=0;i<columns;i++){
  let flowersInColumn = 2 + Math.floor(Math.random()*3); // 2-4 flores por columna
  for(let j=0;j<flowersInColumn;j++){
    let plant=document.createElement("div");
    plant.className="plant";
    plant.style.left=(i*100/columns + Math.random()*(100/columns - 5))+"%";
    plant.style.height=(80+Math.random()*60)+"px";

    let flower=document.createElement("div");
    flower.className="flower";
    flower.style.transform="scale("+(0.7+Math.random()*0.5)+")";

    // pétalos naturales
    for(let p=0;p<6;p++){
      let petal=document.createElement("div");
      petal.className="petal";

      let size = 25 + Math.random()*10; 
      petal.style.width = size+"px";
      petal.style.height = size+"px";

      let topOffset = 0 + Math.random()*40;
      let leftOffset = 0 + Math.random()*40;
      petal.style.top = topOffset + "px";
      petal.style.left = leftOffset + "px";

      let rotate = Math.random()*360;
      petal.style.transform = "rotate("+rotate+"deg)";

      flower.appendChild(petal);
    }

    let center=document.createElement("div");
    center.className="center";
    flower.appendChild(center);

    plant.appendChild(flower);
    document.body.appendChild(plant);

    flowers.push(flower);
  }
}

/* mariposas */
for(let i=0;i<6;i++){
  let b=document.createElement("div");
  b.className="butterfly";
  b.innerHTML="🦋";
  b.style.top=Math.random()*60+"%";
  b.style.animationDelay=Math.random()*10+"s";
  document.body.appendChild(b);
}

/* abejas */
for(let i=0;i<4;i++){
  let bee=document.createElement("div");
  bee.className="bee";
  bee.innerHTML="🐝";
  bee.style.top=Math.random()*60+"%";
  bee.style.animationDelay=Math.random()*6+"s";
  document.body.appendChild(bee);
}

/* pétalos cayendo */
for(let i=0;i<20;i++){
  let petal=document.createElement("div");
  petal.className="petalFall";
  petal.innerHTML="🌸";
  petal.style.left=Math.random()*100+"%";
  petal.style.animationDelay=Math.random()*10+"s";
  document.body.appendChild(petal);
}

/* estrellas */
let stars=[];
for(let i=0;i<80;i++){
  let star=document.createElement("div");
  star.className="star";
  star.innerHTML="✦";
  star.style.left=Math.random()*100+"%";
  star.style.top=Math.random()*50+"%";
  document.body.appendChild(star);
  stars.push(star);
}

/* luciérnagas */
let fireflies=[];
for(let i=0;i<30;i++){
  let f=document.createElement("div");
  f.className="firefly";
  f.style.left=Math.random()*100+"%";
  f.style.top=(60+Math.random()*30)+"%";
  document.body.appendChild(f);
  fireflies.push(f);
}

/* SOL / LUNA */
let sun=document.getElementById("sun");
let night=false;
let rainbow=document.querySelector(".rainbow");

sun.onclick=function(){
  if(!night){
    document.body.style.background="linear-gradient(#0b1a3a, #000022)";
    sun.style.background="#ddd";
    sun.style.boxShadow="0 0 60px #ddd";
    stars.forEach(s=>s.style.opacity=1);
    fireflies.forEach(f=>f.style.opacity=1);
    rainbow.style.opacity=0;
    flowers.forEach(f=>f.classList.add("closed"));
    night=true;
  }else{
    document.body.style.background="linear-gradient(#87ceeb, #a0d8f1)";
    sun.style.background="gold";
    sun.style.boxShadow="0 0 70px gold";
    stars.forEach(s=>s.style.opacity=0);
    fireflies.forEach(f=>f.style.opacity=0);
    rainbow.style.opacity=0.7;
    flowers.forEach(f=>f.classList.remove("closed"));
    night=false;
  }
}
</script>

</body>
</html>
