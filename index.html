<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Jardín Mágico Frondoso</title>
    <style>
        /* --- TUS ESTILOS ORIGINALES (Mantenidos) --- */
        :root {
            --cielo-dia: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            --cielo-noche: linear-gradient(to bottom, #090919 0%, #16213e 100%);
            --tierra: #3d1f05;
            --pasto: #2d5a27;
        }

        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: flex-end; overflow: hidden; transition: background 2s ease; background: var(--cielo-dia); perspective: 1000px; }
        body.noche { background: var(--cielo-noche); }

        /* --- ESTILO DEL BOTÓN DE ENTRADA --- */
        #btn-musica {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 1.2rem; cursor: pointer;
            background: #fff; border: none; border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 1000;
            transition: transform 0.3s;
        }
        #btn-musica:hover { transform: translate(-50%, -50%) scale(1.1); }

        /* ... (AQUÍ IRÍAN TODOS TUS DEMÁS ESTILOS: #astro, .flor, .tallo, .petalo, etc.) ... */
    </style>
</head>
<body id="cuerpo">

    <button id="btn-musica" onclick="iniciarJardin()">🌸 ¡Entrar al Jardín Mágico!</button>

    <div id="astro" onclick="cambiarCiclo()"></div>
    <div class="arcoiris"></div>
    <div id="contenedor-luciernagas"></div>

    <div class="suelo"></div>
    <div class="pasto-capa"></div>

    <script>
        // 1. Instancia de Audio (el corazón del sonido)
        const musica = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
        musica.loop = true;

        // 2. Función maestra de inicio
        function iniciarJardin() {
            // Reproducimos la música
            musica.play().then(() => {
                console.log("Audio activado correctamente");
            }).catch(e => console.error("Error al reproducir:", e));
            
            // Eliminamos la interfaz de entrada
            document.getElementById('btn-musica').style.display = 'none';
        }

        // 3. Función de ciclo día/noche
        function cambiarCiclo() {
            document.getElementById('cuerpo').classList.toggle('noche');
        }

        // 4. Lógica de las luciérnagas (Tu código original)
        const contenedor = document.getElementById('contenedor-luciernagas');
        for (let i = 0; i < 20; i++) {
            let luc = document.createElement('div');
            luc.className = 'luciernaga';
            luc.style.left = Math.random() * 100 + 'vw';
            luc.style.top = Math.random() * 65 + 'vh';
            contenedor.appendChild(luc);
        }
    </script>
</body>
</html>
