<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Jardín mágico</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
animation:sunrise 12s forwards;
}

/* amanecer */

@keyframes sunrise{
0%{background:#0b1a3a;}
50%{background:#ffb6c1;}
100%{background:#87ceeb;}
}

/* suelo */

.ground{
position:absolute;
bottom:0;
width:100%;
height:30%;
background:#4b2e17;
}

/* plantas */

.plant{
position:absolute;
bottom:30%;
width:6px;
height:0;
background:green;
animation:grow 6s forwards;
}

@keyframes grow{
to{
height:140px;
}
}

/* flores */

.flower{
position:absolute;
width:24px;
height:24px;
border-radius:50%;
opacity:0;
transform:scale(0);
animation:bloom 2s forwards;
animation-delay:6s;
}

@keyframes bloom{
to{
opacity:1;
transform:scale(1.6);
}
}

/* pétalos cayendo */

.petal{
position:absolute;
font-size:16px;
animation:fall 10s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);}
}

/* mariposas */

.butterfly{
position:absolute;
font-size:24px;
animation:fly 12s linear infinite;
}

@keyframes fly{
0%{transform:translateX(-100px);}
100%{transform:translateX(110vw);}
}

/* abejas */

.bee{
position:absolute;
font-size:18px;
animation:beeFly 8s linear infinite;
}

@keyframes beeFly{
0%{transform:translateX(-100px);}
100%{transform:translateX(110vw);}
}

</style>
</head>

<body>

<div class="ground"></div>

<!-- plantas -->

<div class="plant" style="left:10%;">
<div class="flower" style="top:-25px;background:pink;"></div>
</div>

<div class="plant" style="left:25%;">
<div class="flower" style="top:-25px;background:yellow;"></div>
</div>

<div class="plant" style="left:40%;">
<div class="flower" style="top:-25px;background:red;"></div>
</div>

<div class="plant" style="left:55%;">
<div class="flower" style="top:-25px;background:purple;"></div>
</div>

<div class="plant" style="left:70%;">
<div class="flower" style="top:-25px;background:orange;"></div>
</div>

<div class="plant" style="left:85%;">
<div class="flower" style="top:-25px;background:cyan;"></div>
</div>

<!-- mariposas -->

<div class="butterfly" style="top:20%;">🦋</div>
<div class="butterfly" style="top:40%;animation-delay:3s;">🦋</div>
<div class="butterfly" style="top:60%;animation-delay:6s;">🦋</div>

<!-- abejas -->

<div class="bee" style="top:50%;">🐝</div>
<div class="bee" style="top:30%;animation-delay:4s;">🐝</div>

<!-- pétalos -->

<div class="petal" style="left:20%;">🌸</div>
<div class="petal" style="left:40%;animation-delay:2s;">🌸</div>
<div class="petal" style="left:60%;animation-delay:4s;">🌸</div>
<div class="petal" style="left:80%;animation-delay:6s;">🌸</div>

<!-- reproductor oculto -->

<div id="player" style="position:absolute;left:-9999px;"></div>

/* cargar API de youtube */

var tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

player = new YT.Player('player', {
height:'1',
width:'1',
videoId:'purdUs68Tmc',
playerVars:{
'autoplay':1,
'controls':0,
'loop':1,
'playlist':'purdUs68Tmc'
}
});

}

</script>

</body>
</html>
