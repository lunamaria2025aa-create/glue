<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Mágico - Glue Song</title>
    <style>
        :root {
            --cielo-dia: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            --cielo-noche: linear-gradient(to bottom, #090919 0%, #16213e 100%);
            --tierra: #3d1f05;
            --pasto: #2d5a27;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            transition: background 2s ease;
            background: var(--cielo-dia);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body.noche { background: var(--cielo-noche); }

        /* --- SOL Y LUNA --- */
        #astro {
            position: absolute;
            top: 40px;
            right: 60px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff700, #ff8c00);
            cursor: pointer;
            box-shadow: 0 0 60px rgba(255, 247, 0, 0.6);
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
        }

        body.noche #astro {
            background: radial-gradient(circle at 30% 30%, #f0f0f0, #7f8c8d);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
            transform: scale(0.9) rotate(-20deg);
        }

        /* --- FLORES --- */
        .jardin {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-bottom: 80px;
            z-index: 10;
        }

        .flor {
            position: relative;
            margin: 0 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .tallo {
            width: 8px;
            background: linear-gradient(to right, #2ecc71, #27ae60);
            height: 0;
            border-radius: 4px;
            animation: crecerTallo 2.5s ease-out forwards;
        }

        .cabeza-flor {
            width: 60px;
            height: 60px;
            position: relative;
            transform: scale(0);
            animation: florecer 1s ease-out forwards;
        }

        .petalo {
            position: absolute;
            width: 25px;
            height: 40px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            left: 17px;
            transform-origin: bottom center;
        }

        .centro {
            width: 20px; height: 20px;
            background: radial-gradient(circle, #ffd700, #f39c12);
            border-radius: 50%;
            position: absolute;
            top: 20px; left: 20px;
            z-index: 5;
        }

        /* Colores de las 8 flores */
        .p-1 { background: #ff69b4; } .p-2 { background: #4db8ff; }
        .p-3 { background: #da70d6; } .p-4 { background: #ff9f43; }
        .p-5 { background: #ff4d4d; } .p-6 { background: #2ecc71; }
        .p-7 { background: #f1c40f; } .p-8 { background: #9b59b6; }

        @keyframes crecerTallo { to { height: 180px; } }
        @keyframes florecer { to { transform: scale(1); } }
        
        /* --- LUCIÉRNAGAS --- */
        .luciernaga {
            position: absolute;
            width: 6px; height: 6px;
            background: #f1c40f;
            border-radius: 50%;
            opacity: 0;
            z-index: 50;
        }
        body.noche .luciernaga { animation: parpadeo 3s infinite; }
        @keyframes parpadeo { 0%, 100% { opacity: 0; } 50% { opacity: 1; box-shadow: 0 0 15px #f1c40f; } }

        .suelo { position: absolute; bottom: 0; width: 100%; height: 80px; background: var(--tierra); z-index: 20; }
        
        #mensaje {
            position: absolute;
            top: 20px;
            color: white;
            background: rgba(0,0,0,0.4);
            padding: 10px 25px;
            border-radius: 30px;
            transition: opacity 0.5s;
        }
    </style>
</head>
