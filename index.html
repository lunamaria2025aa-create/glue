<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jardín con Glue Song</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; transition: background-color 2s; }
        body { background-color: #87CEEB; }
        body.noche { background-color: #191970; }

        /* El Sol/Luna */
        #astro {
            position: absolute; top: 50px; right: 50px; width: 80px; height: 80px;
            border-radius: 50%; cursor: pointer; transition: all 1s; z-index: 10;
        }
        .sol { background-color: #FFD700; box-shadow: 0 0 20px yellow; }
        .luna { background-color: #F0F8FF; box-shadow: 0 0 20px white; }

        /* Contenedor del video (oculto) */
        #contenedor-musica { position: absolute; top: -500px; left: -500px; }

        /* Jardín y Flores */
        #jardin {
            position: absolute; bottom: 0; width: 100%; height: 150px;
            background-color: #228B22; display: flex; justify-content: center; align-items: flex-end;
        }
        .flor { width: 50px; height: 80px; margin: 0 20px; position: relative; }
        .tallo { width: 4px; height: 50px; background-color: #006400; position: absolute; bottom: 0; left: 23px; }
        .centro { width: 15px; height: 15px; background-color: #8B4513; border-radius: 50%; position: absolute; bottom: 50px; left: 17px; z-index: 2; }
        .petalo {
            width: 20px; height: 25px; background-color: #FFB6C1; border-radius: 50%;
            position: absolute; bottom: 55px; left: 15px; transform-origin: bottom center; transition: transform 1s;
        }
        /* Pétalos abiertos */
        .p1 { transform: rotate(0deg); } .p2 { transform: rotate(72deg); }
        .p3 { transform: rotate(144deg); } .p4 { transform: rotate(216deg); }
        .p5 { transform: rotate(288deg); }

        /* Flores cerradas en la noche */
        body.noche .petalo { transform: rotate(0deg) scaleY(0.6); background-color: #DB7093; }
    </style>
</head>
<body>

    <div id="astro" class="sol" onclick="alternar()"></div>

    <div id="contenedor-musica">
        <div id="player"></div>
    </div>

    <div id="jardin">
        <div class="flor">
            <div class="tallo"></div><div class="centro"></div>
            <div class="petalo p1"></div><div class="petalo p2"></div>
            <div class="petalo p3"></div><div class="petalo p4"></div>
            <div class="petalo p5"></div>
        </div>
        <div class="flor">
            <div class="tallo"></div><div class="centro"></div>
            <div class="petalo p1"></div><div class="petalo p2"></div>
            <div class="petalo p3"></div><div class="petalo p4"></div>
            <div class="petalo p5"></div>
        </div>
    </div>

    <script>
        // 1. Cargar la API de YouTube
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: 'AuAl9_2twoQ', // El ID de tu video
                events: {
                    'onReady': onPlayerReady
                }
            });
        }

        function onPlayerReady(event) {
            // El reproductor está listo
        }

        function alternar() {
            const body = document.body;
            const astro = document.getElementById('astro');
            
            // Reproducir música al tocar el sol por primera vez
            if (player && player.getPlayerState() !== 1) {
                player.playVideo();
            }

            if (body.classList.contains('noche')) {
                body.classList.remove('noche');
                astro.classList.replace('luna', 'sol');
            } else {
                body.classList.add('noche');
                astro.classList.replace('sol', 'luna');
            }
        }
    </script>
</body>
</html>
