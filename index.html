<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jardín Mágico Evolucionado</title>
    <style>
        :root {
            --cielo-dia: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
            --cielo-noche: linear-gradient(to bottom, #090919 0%, #16213e 100%);
            --tierra: #3d1f05;
            --pasto: #2d5a27;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            transition: background 2s ease;
            background: var(--cielo-dia);
            perspective: 1000px;
        }

        body.noche {
            background: var(--cielo-noche);
        }

        /* --- SOL Y LUNA --- */
        #astro {
            position: absolute;
            top: 40px;
            right: 60px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #fff700, #ff8c00);
            cursor: pointer;
            box-shadow: 0 0 60px rgba(255, 247, 0, 0.6);
            transition: all 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }

        body.noche #astro {
            background: radial-gradient(circle at 30% 30%, #f0f0f0, #7f8c8d);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
            transform: scale(0.9) rotate(-20deg);
        }

        /* --- ARCOÍRIS REALISTA --- */
        .arcoiris {
            position: absolute;
            bottom: 150px;
            width: 800px;
            height: 400px;
            border-radius: 400px 400px 0 0;
            background: radial-gradient(circle at 50% 100%, 
                transparent 50%, 
                rgba(148, 0, 211, 0.2) 53%, 
                rgba(75, 0, 130, 0.2) 56%, 
                rgba(0, 0, 255, 0.2) 59%, 
                rgba(0, 255, 0, 0.2) 62%, 
                rgba(255, 255, 0, 0.2) 65%, 
                rgba(255, 127, 0, 0.2) 68%, 
                rgba(255, 0, 0, 0.2) 71%,
                transparent 74%);
            filter: blur(4px);
            z-index: 1;
            transition: opacity 1.5s;
        }

        body.noche .arcoiris { opacity: 0; }

        /* --- FLORES CON VOLUMEN --- */
        .flor {
            position: relative;
            margin: 0 40px;
            z-index: 10;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.2));
        }

        .tallo {
            width: 12px;
            background: linear-gradient(to right, #2ecc71, #27ae60);
            height: 0;
            border-radius: 5px;
            animation: crecerTallo 3s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }

        .cabeza-flor {
            width: 80px;
            height: 80px;
            position: relative;
            transform: scale(0);
            animation: florecer 1s 2.5s ease-out forwards;
        }

        .petalo {
            position: absolute;
            width: 35px;
            height: 50px;
            background: radial-gradient(circle, #ff69b4, #c2185b);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            left: 22px;
            transform-origin: bottom center;
            transition: box-shadow 1s;
        }

        /* Brillo de las flores en la noche */
        body.noche .petalo {
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
        }

        .centro {
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, #ffd700, #f39c12);
            border-radius: 50%;
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 5;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.2);
        }

        /* --- LUCIÉRNAGAS --- */
        .luciernaga {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            filter: blur(1px);
            opacity: 0;
            z-index: 15;
        }

        body.noche .luciernaga {
            animation: parpadeo 3s infinite ease-in-out, movimiento 10s infinite alternate linear;
        }

        @keyframes crecerTallo { to { height: 220px; } }
        @keyframes florecer { to { transform: scale(1) rotate(10deg); } }
        @keyframes parpadeo { 0%, 100% { opacity: 0; box-shadow: 0 0 0px #f1c40f; } 50% { opacity: 1; box-shadow: 0 0 15px #f1c40f; background: #f1c40f;} }
        @keyframes movimiento { from { transform: translate(0,0); } to { transform: translate(100px, -100px); } }

        /* --- AMBIENTE --- */
        .suelo {
            position: absolute;
            bottom: 0; width: 100%; height: 80px;
            background: var(--tierra); z-index: 12;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
        }

        .pasto-capa {
            position: absolute;
            bottom: 80px; width: 100%; height: 30px;
            background: var(--pasto); z-index: 11;
            border-radius: 50% 50% 0 0 / 20px 20px 0 0;
        }

    </style>
</head>
<body id="cuerpo">

    <div id="astro" onclick="cambiarCiclo()"></div>
    <div class="arcoiris"></div>

    <div id="contenedor-luciernagas"></div>

    <div class="flor">
        <div class="cabeza-flor">
            <div class="petalo" style="transform: rotate(0deg)"></div>
            <div class="petalo" style="transform: rotate(72deg)"></div>
            <div class="petalo" style="transform: rotate(144deg)"></div>
            <div class="petalo" style="transform: rotate(216deg)"></div>
            <div class="petalo" style="transform: rotate(288deg)"></div>
            <div class="centro"></div>
        </div>
        <div class="tallo"></div>
    </div>

    <div class="flor">
        <div class="cabeza-flor" style="animation-delay: 2.8s;">
            <div class="petalo" style="transform: rotate(0deg); background: radial-gradient(circle, #4db8ff, #0052cc)"></div>
            <div class="petalo" style="transform: rotate(72deg); background: radial-gradient(circle, #4db8ff, #0052cc)"></div>
            <div class="petalo" style="transform: rotate(144deg); background: radial-gradient(circle, #4db8ff, #0052cc)"></div>
            <div class="petalo" style="transform: rotate(216deg); background: radial-gradient(circle, #4db8ff, #0052cc)"></div>
            <div class="petalo" style="transform: rotate(288deg); background: radial-gradient(circle, #4db8ff, #0052cc)"></div>
            <div class="centro"></div>
        </div>
        <div class="tallo" style="animation-delay: 0.5s;"></div>
    </div>

    <div class="suelo"></div>
    <div class="pasto-capa"></div>

    <iframe id="musica" width="1" height="1" src="https://www.youtube.com/embed/purdUs68Tmc?autoplay=1" frameborder="0" allow="autoplay" style="visibility:hidden"></iframe>

    <script>
        function cambiarCiclo() {
            document.getElementById('cuerpo').classList.toggle('noche');
        }

        const contenedor = document.getElementById('contenedor-luciernagas');
        for (let i = 0; i < 20; i++) {
            let luc = document.createElement('div');
            luc.className = 'luciernaga';
            luc.style.left = Math.random() * 100 + 'vw';
            luc.style.top = Math.random() * 70 + 'vh';
            luc.style.animationDelay = Math.random() * 5 + 's';
            luc.style.animationDuration = (3 + Math.random() * 4) + 's';
            contenedor.appendChild(luc);
        }
    </script>
</body>
</html>
