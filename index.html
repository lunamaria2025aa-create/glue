<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jardín Mágico de Gemini</title>
    <style>
        :root {
            --cielo-dia: #87CEEB;
            --cielo-noche: #1a1a2e;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            transition: background-color 2s;
            background-color: var(--cielo-dia);
            font-family: sans-serif;
        }

        /* --- SOL Y LUNA --- */
        #astro {
            position: absolute;
            top: 50px;
            right: 80px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff700, #ff8c00);
            cursor: pointer;
            box-shadow: 0 0 50px #fff700;
            transition: all 2s;
            z-index: 20;
        }

        body.noche #astro {
            background: radial-gradient(circle, #f0f0f0, #bdc3c7);
            box-shadow: 0 0 30px #ffffff;
            transform: translateX(-50px);
        }

        /* --- ARCOÍRIS --- */
        .arcoiris {
            position: absolute;
            top: 50px;
            width: 500px;
            height: 250px;
            border-radius: 250px 250px 0 0;
            border: 15px solid transparent;
            border-top: 15px solid rgba(255, 0, 0, 0.4);
            box-shadow: 0 -15px 0 rgba(255, 165, 0, 0.4), 
                        0 -30px 0 rgba(255, 255, 0, 0.4),
                        0 -45px 0 rgba(0, 128, 0, 0.4),
                        0 -60px 0 rgba(0, 0, 255, 0.4),
                        0 -75px 0 rgba(75, 0, 130, 0.4);
            z-index: 1;
            transition: opacity 2s;
        }

        body.noche .arcoiris { opacity: 0; }

        /* --- LUCIÉRNAGAS --- */
        .luciernaga {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #f1c40f;
            border-radius: 50%;
            box-shadow: 0 0 10px #f1c40f;
            opacity: 0;
            z-index: 15;
        }

        body.noche .luciernaga {
            animation: volar 5s infinite ease-in-out;
        }

        @keyframes volar {
            0%, 100% { transform: translate(0,0); opacity: 0; }
            50% { transform: translate(50px, -50px); opacity: 1; }
        }

        /* --- EL JARDÍN (Tu código original mejorado) --- */
        .suelo {
            position: absolute;
            bottom: 0; width: 100%; height: 60px;
            background: #4d2600; z-index: 12;
        }

        .flor {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 30px;
            z-index: 10;
        }

        .tallo {
            width: 8px;
            background-color: #2ecc71;
            height: 0;
            animation: crecerTallo 3s ease-out forwards;
        }

        .petalos {
            width: 60px;
            height: 60px;
            background-color: #e91e63;
            border-radius: 50%;
            transform: scale(0);
            animation: florecer 1s 2.5s ease-out forwards;
            position: relative;
        }

        .centro {
            width: 20px; height: 20px;
            background: #f1c40f;
            border-radius: 50%;
            position: absolute; top: 20px; left: 20px;
        }

        @keyframes crecerTallo { to { height: 180px; } }
        @keyframes florecer { to { transform: scale(1); } }

        /* Estilo para el reproductor invisible */
        #musica { position: absolute; left: -9999px; }

    </style>
</head>
<body id="cuerpo">

    <div id="astro" onclick="cambiarCiclo()"></div>
    <div class="arcoiris"></div>

    <div id="contenedor-luciernagas"></div>

    <div class="flor"><div class="petalos"><div class="centro"></div></div><div class="tallo"></div></div>
    <div class="flor"><div class="petalos" style="background: #9b59b6;"><div class="centro"></div></div><div class="tallo" style="animation-delay: 0.5s;"></div></div>
    <div class="flor"><div class="petalos" style="background: #3498db;"><div class="centro"></div></div><div class="tallo" style="animation-delay: 1s;"></div></div>

    <div class="suelo"></div>

    <div id="musica">
        <iframe width="1" height="1" src="https://www.youtube.com/embed/purdUs68Tmc?autoplay=1" frameborder="0" allow="autoplay"></iframe>
    </div>

    <script>
        function cambiarCiclo() {
            document.getElementById('cuerpo').classList.toggle('noche');
        }

        // Crear luciérnagas aleatorias
        const contenedor = document.getElementById('contenedor-luciernagas');
        for (let i = 0; i < 15; i++) {
            let luc = document.createElement('div');
            luc.className = 'luciernaga';
            luc.style.left = Math.random() * 100 + 'vw';
            luc.style.top = Math.random() * 80 + 'vh';
            luc.style.animationDelay = Math.random() * 5 + 's';
            contenedor.appendChild(luc);
        }
    </script>
</body>
</html>
